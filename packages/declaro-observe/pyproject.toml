[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "declaro-observe"
version = "0.1.0"
description = "Event sourcing observability for the functional Python stack"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [
    { name = "Adam Zachary Wasserman" }
]
keywords = [
    "observability",
    "event-sourcing",
    "functional",
    "fastapi",
    "middleware",
    "tracing",
    "metrics",
]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: System :: Monitoring",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]

dependencies = [
    "tomli>=2.0.0;python_version<'3.11'",
]

[project.optional-dependencies]
fastapi = ["fastapi>=0.100.0", "starlette>=0.27.0"]
otlp = ["opentelemetry-api>=1.20.0", "opentelemetry-sdk>=1.20.0"]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
    "pytest-bdd>=6.0.0",
    "mypy>=1.0.0",
    "httpx>=0.24.0",
]

[project.urls]
Homepage = "https://github.com/adamzwasserman/declaro"
Documentation = "https://github.com/adamzwasserman/declaro/tree/main/packages/declaro-observe"
Repository = "https://github.com/adamzwasserman/declaro"

[tool.hatch.build.targets.wheel]
packages = ["src/declaro_observe"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_ignores = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
