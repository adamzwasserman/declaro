[project]
name = "declaro_tablix"
version = "0.1.0"
description = "Declarative table and filter system with CSS Grid layouts"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
authors = [{ name = "Adam" }]
keywords = ["tables", "filters", "css-grid", "htmx", "jinja2", "pydantic"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Internet :: WWW/HTTP",
    "Typing :: Typed",
]

dependencies = [
    "pydantic>=2.0.0",
    "jinja2>=3.1.0",
    "fastapi>=0.128.0",
    "httpx>=0.28.1",
    "sqlalchemy>=2.0.0",
    "redis>=5.0.0",
    # Local declaro packages (path dependencies for monorepo dev)
    "declaro_advise",
    "declaro_persistum",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
    "pytest-bdd>=7.0.0",
    "mypy>=1.0.0",
    "ruff>=0.1.0",
    "coverage>=7.0.0",
]

[project.urls]
Homepage = "https://github.com/adam/declaro_tablix"
Documentation = "https://github.com/adam/declaro_tablix#readme"
Repository = "https://github.com/adam/declaro_tablix"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/declaro_tablix"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
    "ARG",    # flake8-unused-arguments
    "SIM",    # flake8-simplify
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # do not perform function calls in argument defaults
]

[tool.ruff.lint.isort]
known-first-party = ["declaro_tablix"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_ignores = true
disallow_untyped_defs = true
disallow_incomplete_defs = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-v --tb=short"
markers = [
    "precommit: fast sanity checks (30s max total)",
    "bdd: BDD feature tests",
]

[tool.coverage.run]
source = ["src/declaro_tablix"]
branch = true

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "@overload",
]

[tool.uv.sources]
declaro_advise = { path = "../declaro-advise", editable = true }
declaro_persistum = { path = "../declaro-persistum", editable = true }
