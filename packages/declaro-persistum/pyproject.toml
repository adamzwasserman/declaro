[project]
name = "declaro_persistum"
version = "0.1.0"
description = "Pure functional SQL library with declarative schema migrations"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
authors = [{ name = "Adam" }]
keywords = ["sql", "database", "migrations", "functional", "postgresql", "sqlite"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Database",
    "Typing :: Typed",
]

dependencies = [
    "tomli-w>=1.0.0",
]

[project.optional-dependencies]
postgresql = ["asyncpg>=0.28.0"]
sqlite = ["aiosqlite>=0.19.0"]
turso = ["pyturso>=0.5.1"]
all = [
    "declaro_persistum[postgresql]",
    "declaro_persistum[sqlite]",
    "declaro_persistum[turso]",
]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
    "pytest-bdd>=7.0.0",
    "pytest-timeout>=2.2.0",
    "hypothesis>=6.0.0",
    "faker>=22.0.0",
    "mypy>=1.0.0",
    "ruff>=0.1.0",
    "coverage>=7.0.0",
]
examples = [
    "fastapi>=0.109.0",
    "uvicorn>=0.27.0",
    "aiosqlite>=0.19.0",
    "jinja2>=3.1.0",
    "python-multipart>=0.0.6",
    "django>=4.2.0",
    "mako>=1.3.0",
]

[project.scripts]
declaro = "declaro_persistum.cli.main:main"

[project.urls]
Homepage = "https://github.com/adamzwasserman/declaro"
Documentation = "https://github.com/adamzwasserman/declaro#readme"
Repository = "https://github.com/adamzwasserman/declaro"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["src/declaro_persistum"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
    "ARG",    # flake8-unused-arguments
    "SIM",    # flake8-simplify
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # do not perform function calls in argument defaults
]

[tool.ruff.lint.isort]
known-first-party = ["declaro_persistum"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_ignores = true
disallow_untyped_defs = true
disallow_incomplete_defs = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-v --tb=short"
markers = [
    "precommit: fast sanity checks (30s max total)",
    "stress: full stress testing with real databases",
    "bdd: BDD feature tests",
    "sqlite: requires SQLite database",
    "postgresql: requires PostgreSQL database",
    "turso: requires Turso database",
]

[tool.coverage.run]
source = ["src/declaro_persistum"]
branch = true

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "@overload",
]

[dependency-groups]
dev = [
    "python-dotenv>=1.2.2",
]
